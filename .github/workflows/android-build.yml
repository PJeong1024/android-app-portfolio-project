name: Android CI

on:
  push:
    branches: [ main ]
    paths:
      - 'android-app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'android-app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: JDK 설치
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: API 키 주입
        run: |
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > android-app/local.properties

      - name: 실행 권한 부여
        run: chmod +x android-app/gradlew

      - name: APK 빌드
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: APK 업로드
        uses: actions/upload-artifact@v3
        with:
          name: app-debug.apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
