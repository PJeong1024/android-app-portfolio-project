name: Electron CI

on:
  push:
    branches: [ main ]
    paths:
      - 'electron-app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'electron-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Python setuptools 설치 (node-gyp 의존성)
        run: pip3 install setuptools

      - name: API 키 주입
        run: |
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > electron-app/.env

      - name: 패키지 설치
        run: |
          cd electron-app
          npm install

      - name: Electron 빌드
        run: |
          cd electron-app
          npm run build:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
